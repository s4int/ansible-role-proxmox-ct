---
proxmox_api_port_default: 8006

# OS and Template Configuration
proxmox_ct_ostemplate_default: "local:vztmpl/debian-12-standard_12.7-1_amd64.tar.zst"
proxmox_ct_ostype_default: auto

# Resource Configuration
proxmox_ct_cores_default: 2
proxmox_ct_memory_default: 2048
proxmox_ct_storage_default: local-zfs

# System Configuration
proxmox_ct_timezone_default: host
proxmox_ct_unprivileged_default: false
proxmox_ct_onboot_default: true

# Network Configuration
proxmox_ct_netif_default:
  net0: "name=eth0,ip=dhcp,ip6=dhcp,bridge=vmbr0,firewall=0"

proxmoc_ct_template_storage: local
