---
repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: yamllint
        files: \.(yml|yaml)$

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        name: ansible-lint
        additional_dependencies:
          - ansible
        files: \.(yml|yaml)$
